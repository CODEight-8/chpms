version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chpms
      POSTGRES_USER: chpms_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chpms_user -d chpms"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://chpms_user:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/chpms
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set}
      NEXTAUTH_URL: http://localhost:3000
      OWNER_EMAIL: ${OWNER_EMAIL:?OWNER_EMAIL must be set}
      OWNER_PASSWORD: ${OWNER_PASSWORD:?OWNER_PASSWORD must be set}
    ports:
      - "3000:3000"
    volumes:
      - appdata:/app/data
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    internal: false

volumes:
  pgdata:
  appdata:
